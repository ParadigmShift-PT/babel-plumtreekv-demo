# === PlumtreeKV configuration ===============================================
# Every value here can be overridden on the command line, e.g.
#   java -jar babel-plumtree-demo.jar babel.port=6000 babel.interface=en0
# The same key=value override mechanism is how babel-plumtree-experiments sweeps
# parameters across runs.
# ============================================================================

#### Process-wide bind (babel.*) — defaults a protocol's channel uses unless it
#### defines its own namespaced address/interface/port. HyParView binds its
#### membership channel here; MultiPlumtree shares that channel (no second port).
# TCP port HyParView (membership) listens on. To run SEVERAL nodes on ONE machine,
# space their ports by >= 10 (the web UI is babel.port + 2000).
babel.port=6000
# Network interface to bind/announce on (e.g. en0 on macOS, eth0 on Linux). If left
# unset, the sole reachable physical interface is auto-detected (see InterfaceToIp).
#babel.interface=en0
# Bind/announce IP — overrides interface auto-detection. NO loopback default. Use
# 127.0.0.1 to run several nodes on one disconnected machine.
#babel.address=127.0.0.1

#### Discovery — OFF by default. With no babel.discovery key, babel-core loads no
#### discovery protocol, so nodes bootstrap explicitly via HyParView.contact (below).
#### To use multicast LAN auto-discovery, opt in on the COMMAND LINE:
####   babel.discovery=pt.unl.fct.di.novasys.babel.core.protocols.discovery.MulticastDiscoveryProtocol
#### For SEVERAL multicast nodes on ONE host, also pass a distinct
#### babel.discovery.unicast.port (default 1026) per node.

#### Membership — HyParView (slot 2500). Partial-view overlay: a small active view
#### (the gossip neighbours) + a larger passive view of fallbacks refreshed by shuffles.
# Bootstrap. LEAVE COMMENTED OUT for normal auto-discovery. 'none' = first node:
# don't probe, but still answer probes. 'host:port' = seed directly from an existing node.
#HyParView.contact=none
# Active view = the neighbour degree Plumtree builds its tree over. Keep it >= 4
# (ideally 5): a thinner view can fragment the overlay and leave the tree unable to
# cover every node.
HyParView.ActiveView=5
HyParView.PassiveView=10
HyParView.ARWL=4
HyParView.PRWL=2
HyParView.ShufflePeriod=2000
HyParView.kActive=2
HyParView.kPassive=3

#### Dissemination — MultiPlumtree (slot 3100). One spanning tree per writer (root):
#### novel writes are eager-pushed along the tree and lazy-announced (IHAVE) on the
#### rest of the overlay, which recovers losses and heals the tree.
# Share HyParView's channel rather than opening a second one (Main sets this too).
MultiPlumtree.PeerAddressResolution=shared
# Lazy-push tick: how often pending IHAVE announcements are flushed / retried (ms).
# Bounds tree-repair latency.
MultiPlumtree.LazyTickPeriod=1000
# How long a delivered message is remembered (dedup + graft-replay window, ms).
MultiPlumtree.DeliveredTimeout=600000

#### PlumtreeKV application (slot 300) — params namespaced 'plumtreekv.'
# Web UI: an embedded HTTP server rendering the registry + this node's neighbours.
plumtreekv.ui.enabled=true
# UI port. Defaults to babel.port + 2000 (so local nodes get distinct UI ports
# automatically); set explicitly to override.
#plumtreekv.ui.port=8000
# Open the system's default browser at the UI on startup (best-effort). Set false
# when running several local nodes and you don't want a tab per node.
plumtreekv.ui.open=true
# Snapshot sync: on joining, request the current registry from one neighbour over
# HyParView's channel so a late joiner sees existing state immediately.
plumtreekv.snapshot.sync=true
# Periodic convergence digest written to the telemetry log (ms; <= 0 disables).
plumtreekv.digest.interval=5000

#### Headless workload driver — used by the experiments harness, off for interactive
#### demos. When enabled, this node writes random keys at a fixed rate (no UI needed).
plumtreekv.workload.enabled=false
# Writes per second this node generates.
plumtreekv.workload.rate=2
# Number of distinct keys the workload writes to (the keyspace: k0..k{N-1}).
plumtreekv.workload.keyspace=16
# How long to keep writing (ms); <= 0 = until the process is stopped.
plumtreekv.workload.duration=0
# Delay before the first write (ms) — lets the overlay form first.
plumtreekv.workload.startDelay=5000
